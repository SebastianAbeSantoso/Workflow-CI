name: MSML CI Retraining

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: msml-project
          environment-file: MLProject/conda.yaml
          python-version: '3.12'

      - name: Run MLflow Project
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local --experiment-name msml-ci-retraining

      - name: Upload training artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-artifacts
          path: MLProject/mlruns

      - name: Read run ID
        shell: bash -l {0}
        working-directory: MLProject
        run: echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image via mlflow
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/msml-wfp-model" --enable-mlserver

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/msml-wfp-model"